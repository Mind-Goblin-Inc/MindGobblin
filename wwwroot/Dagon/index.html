<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, viewport-fit=cover">
    <title>Echo Rift</title>
    <style>
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #020608;
      }

      body {
        font-family: Arial, sans-serif;
      }

      #unity-container {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        background: #020608;
      }

      #unity-container.unity-mobile,
      #unity-container.unity-desktop {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
      }

      #unity-canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #231F20;
      }

      #unity-loading-bar {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: min(320px, 72vw);
        display: none;
        z-index: 3;
        text-align: center;
      }

      #unity-logo {
        margin-bottom: 12px;
        color: #d7e7e2;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      #unity-progress-bar-empty {
        width: 100%;
        height: 12px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      #unity-progress-bar-full {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #5ec2a9, #d8ecd8);
      }

      #unity-warning {
        position: fixed;
        left: 50%;
        top: 16px;
        transform: translateX(-50%);
        display: none;
        z-index: 4;
      }

      #unity-warning > div {
        margin-bottom: 8px;
        border-radius: 8px;
      }

      #unity-fullscreen-button {
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 2;
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 999px;
        background: rgba(6, 10, 12, 0.72);
        color: #f4f7f4;
        padding: 10px 14px;
        font: inherit;
        cursor: pointer;
        backdrop-filter: blur(4px);
      }

      #unity-fullscreen-button:hover {
        border-color: rgba(216, 236, 216, 0.72);
        color: #d8ecd8;
      }
    </style>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo">Echo Rift</div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"></div>
      <button id="unity-fullscreen-button" type="button">Fullscreen</button>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? "block" : "none";
        }

        var div = document.createElement("div");
        div.innerHTML = msg;
        div.style.padding = "10px 12px";
        div.style.background = type === "error" ? "#8f1e1e" : "#a78d18";
        div.style.color = "#fff";
        warningBanner.appendChild(div);
        if (type !== "error") {
          setTimeout(function() {
            if (div.parentNode === warningBanner) {
              warningBanner.removeChild(div);
              updateBannerVisibility();
            }
          }, 5000);
        }

        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Dagon.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/Dagon.data.br",
        frameworkUrl: buildUrl + "/Dagon.framework.js.br",
        codeUrl: buildUrl + "/Dagon.wasm.br",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Echo Rift",
        productVersion: "0.1.0",
        showBanner: unityShowBanner
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement("meta");
        meta.name = "viewport";
        meta.content = "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes";
        document.getElementsByTagName("head")[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        document.querySelector("#unity-container").className = "unity-desktop";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      function triggerCanvasResize() {
        window.dispatchEvent(new Event("resize"));
      }

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = function() {
        createUnityInstance(canvas, config, function(progress) {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then(function(unityInstance) {
          document.querySelector("#unity-loading-bar").style.display = "none";
          document.querySelector("#unity-fullscreen-button").onclick = function() {
            unityInstance.SetFullscreen(1);
          };
          triggerCanvasResize();
          requestAnimationFrame(triggerCanvasResize);
          setTimeout(triggerCanvasResize, 120);

        }).catch(function(message) {
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
